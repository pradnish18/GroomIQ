<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - GroomIQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #0a0a0f; --card: #13131a; --border: #2a2a3a;
      --accent: #c8a96e; --text: #e8e8f0; --muted: #888899;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(200,169,110,0.06) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--text);
      margin-bottom: 4px;
    }

    .card > .sub {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 24px;
    }

    .input-group { margin-bottom: 16px; }

    .input-group label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus { border-color: var(--accent); }
    .input-group input::placeholder { color: var(--muted); }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0;
      line-height: 1;
    }
    .toggle-pw:hover { color: var(--accent); }

    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px;
    }

    .forgot-row a {
      color: var(--muted);
      font-size: 0.78rem;
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-row a:hover {
      color: var(--accent);
    }

    .form-error {
      background: rgba(232,90,90,0.1);
      border: 1px solid rgba(232,90,90,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #e85a5a;
      font-size: 0.83rem;
      margin-bottom: 16px;
      display: none;
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .btn-primary:hover {
      background: #d4b87a;
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(200,169,110,0.25);
    }

    .btn-primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .divider span {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider p {
      color: var(--muted);
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .social-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-social {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-social:hover {
      border-color: var(--accent);
      background: rgba(200,169,110,0.05);
      transform: translateY(-1px);
    }

    .btn-social svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .switch {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .switch a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .switch a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 24px 20px; }
      .wrapper { padding: 12px; }
    }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="logo">
    <h1>✦ GroomIQ</h1>
  </div>

  <div class="card">
    <h2>Welcome Back</h2>
    <p class="sub">Sign in to continue to your dashboard</p>

    <div class="form-error" id="formError">⚠ Error message</div>

    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"
             oninput="clearError()">
    </div>

    <div class="input-group">
      <label>Password</label>
      <div class="input-wrapper">
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"
               oninput="clearError()"
               onkeydown="if(event.key==='Enter') handleLogin(event)">
        <button class="toggle-pw" type="button" onclick="togglePassword('password', this)" tabindex="-1">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="forgot-row">
        <a href="forgot-password.html">Forgot Password?</a>
      </div>
    </div>

    <button class="btn-primary" id="loginBtn" onclick="handleLogin(event)">Sign In →</button>

    <div class="divider">
      <span></span>
      <p>or continue with</p>
      <span></span>
    </div>

    <div class="social-btns">
      <button class="btn-social" onclick="handleGoogleSignIn()">
        <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
        Continue with Google
      </button>
      <button class="btn-social" onclick="handleGitHubSignIn()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        Continue with GitHub
      </button>
    </div>

    <p class="switch">
      Don't have an account? <a href="signup.html">Create one</a>
    </p>
  </div>

</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  const isPassword = input.type === 'password';
  input.type = isPassword ? 'text' : 'password';
  btn.innerHTML = isPassword
    ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
    : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  btn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
}

function showError(message) {
  const el = document.getElementById('formError');
  el.textContent = '⚠ ' + message;
  el.style.display = 'block';
}

function clearError() {
  document.getElementById('formError').style.display = 'none';
}

async function handleLogin(event) {
  if (event) event.preventDefault();
  clearError();

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');

  if (!email || !password) {
    showError('Please enter your email and password');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing In...';

  try {
    await GroomIQAuth.login({ preventDefault: () => {} });
  } catch (err) {
    showError(err.message || 'Login failed. Please check your credentials.');
    btn.disabled = false;
    btn.textContent = 'Sign In →';
  }
}

let googleInitialized = false;

function initGoogleSignIn() {
  if (window.google && !googleInitialized) {
    google.accounts.id.initialize({
      client_id: '577213626701-jdga4crhi59ahkdcd781ai8d6tp70p57.apps.googleusercontent.com',
      callback: handleCredentialResponse,
      cancel_on_tap_outside: false,
    });
    googleInitialized = true;
  }
}

function handleGoogleSignIn() {
  if (!window.google) {
    showError('Google Sign-In is loading. Please try again.');
    return;
  }
  initGoogleSignIn();
  google.accounts.id.prompt();
}

function handleCredentialResponse(response) {
  try {
    const payload = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    googleAuth({ email: payload.email, name: payload.name, sub: payload.sub });
  } catch (e) {
    showError('Failed to process Google Sign-In.');
    console.error(e);
  }
}

window.addEventListener('load', initGoogleSignIn);

function handleGitHubSignIn() {
  showError('GitHub Sign-In will be available soon.');
}

window.addEventListener('load', () => {
  const session = GroomIQAuth.getSession();
  if (session.token) {
    window.location.href = 'dashboard.html';
  }
});
</script>
</body>
</html>
