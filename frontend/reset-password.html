<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - GroomIQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="js/config.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --border: #2a2a3a;
      --accent: #c8a96e;
      --text: #e8e8f0;
      --muted: #888899;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(200,169,110,0.06) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .logo p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 6px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card > p {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 28px;
    }

    .input-group { margin-bottom: 16px; }

    .input-group label {
      display: block;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-group input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus { border-color: var(--accent); }
    .input-group input::placeholder { color: var(--muted); }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0;
    }
    .toggle-pw:hover { color: var(--accent); }

    /* Strength meter */
    .strength-meter {
      display: flex;
      gap: 4px;
      margin-top: 8px;
      height: 4px;
    }

    .strength-meter .bar {
      flex: 1;
      background: var(--border);
      border-radius: 2px;
      transition: background 0.3s;
    }

    .strength-meter .bar.active.weak { background: #e85a5a; }
    .strength-meter .bar.active.medium { background: #e8a05a; }
    .strength-meter .bar.active.strong { background: #4acea8; }
    .strength-meter .bar.active.very-strong { background: #2ec88a; }

    .strength-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
      text-align: right;
    }

    .form-msg {
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }

    .form-msg.error {
      display: block;
      background: rgba(232,90,90,0.1);
      border: 1px solid rgba(232,90,90,0.3);
      color: #e85a5a;
    }

    .form-msg.success {
      display: block;
      background: rgba(78,202,168,0.1);
      border: 1px solid rgba(78,202,168,0.3);
      color: #4acea8;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    .btn:hover {
      background: #d4b87a;
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(200,169,110,0.25);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .switch {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .switch a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .switch a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="logo">
    <h1>✦ GroomIQ</h1>
    <p>AI Grooming Assistant • Hair • Beard • Style</p>
  </div>

  <div class="card">
    <h2>Reset Password</h2>
    <p>Enter your new password below</p>

    <div class="form-msg" id="formMsg"></div>

    <form id="resetForm" novalidate>
      <div class="input-group">
        <label>New Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Enter new password" required>
          <button class="toggle-pw" type="button" onclick="togglePassword('password', this)">👁</button>
        </div>
        <div class="strength-meter" id="strengthMeter">
          <div class="bar" data-index="0"></div>
          <div class="bar" data-index="1"></div>
          <div class="bar" data-index="2"></div>
          <div class="bar" data-index="3"></div>
        </div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <div class="input-wrapper">
          <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
          <button class="toggle-pw" type="button" onclick="togglePassword('confirmPassword', this)">👁</button>
        </div>
      </div>

      <button type="submit" class="btn" id="submitBtn">Reset Password</button>
    </form>

    <p class="switch">
      Remember your password? <a href="login.html">Back to Login</a>
    </p>
  </div>

</div>

<script>
const API_BASE = window.API_BASE;

const form = document.getElementById('resetForm');
const passwordInput = document.getElementById('password');
const confirmInput = document.getElementById('confirmPassword');
const submitBtn = document.getElementById('submitBtn');
const formMsg = document.getElementById('formMsg');
const bars = document.querySelectorAll('#strengthMeter .bar');
const strengthLabel = document.getElementById('strengthLabel');

const labels = ['', 'Weak', 'Medium', 'Strong', 'Very Strong'];
const classes = ['', 'weak', 'medium', 'strong', 'very-strong'];

function updateStrength(password) {
  let score = 0;
  if (password.length >= 8) score++;
  if (password.length >= 12) score++;
  if (/[A-Z]/.test(password) && /[a-z]/.test(password)) score++;
  if (/\d/.test(password) && /[^A-Za-z0-9]/.test(password)) score++;

  bars.forEach((bar, i) => {
    bar.className = 'bar';
    if (i < score) {
      bar.classList.add('active', classes[score] || 'weak');
    }
  });

  strengthLabel.textContent = score > 0 ? labels[score] : '';
}

passwordInput.addEventListener('input', () => {
  updateStrength(passwordInput.value);
});

function showMessage(msg, type) {
  formMsg.className = 'form-msg ' + type;
  formMsg.textContent = msg;
}

function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}

// Get token from URL
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

if (!token) {
  showMessage('Invalid or missing reset token. Please request a new password reset.', 'error');
  submitBtn.disabled = true;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const password = passwordInput.value;
  const confirm = confirmInput.value;

  if (!password || !confirm) {
    showMessage('Please fill in all fields.', 'error');
    return;
  }

  if (password.length < 8) {
    showMessage('Password must be at least 8 characters.', 'error');
    return;
  }

  if (password !== confirm) {
    showMessage('Passwords do not match.', 'error');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Resetting...';
  showMessage('', '');

  try {
    const res = await fetch(`${API_BASE}/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || 'Failed to reset password');
    }

    showMessage(data.message || 'Password reset successful! Redirecting to login...', 'success');

    setTimeout(() => {
      window.location.href = 'login.html';
    }, 3000);
  } catch (err) {
    showMessage(err.message, 'error');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Reset Password';
  }
});
</script>
</body>
</html>
