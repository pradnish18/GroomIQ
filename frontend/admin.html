<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GroomIQ - Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f; --card: #13131a; --border: #2a2a3a;
      --accent: #c8a96e; --text: #e8e8f0; --muted: #888899;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

    header {
      padding:16px 40px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      background:rgba(10,10,15,0.95); position:sticky; top:0; z-index:100;
      backdrop-filter:blur(14px);
    }
    header h1 { font-family:'Playfair Display',serif; font-size:1.3rem; color:var(--accent); cursor:pointer; }

    .main { padding:32px 40px; max-width:1200px; margin:0 auto; }

    .page-title { font-family:'Playfair Display',serif; font-size:1.8rem; margin-bottom:4px; }
    .page-title span { color:var(--accent); font-style:italic; }
    .page-sub { color:var(--muted); font-size:0.88rem; margin-bottom:28px; }

    .tabs { display:flex; gap:4px; margin-bottom:28px; background:rgba(255,255,255,0.03); border-radius:12px; padding:4px; border:1px solid var(--border); width:fit-content; }
    .tab {
      padding:10px 22px; border:none; border-radius:8px; font-family:'DM Sans',sans-serif;
      font-size:0.85rem; font-weight:600; cursor:pointer; transition:all 0.2s;
      background:transparent; color:var(--muted);
    }
    .tab:hover { color:var(--text); }
    .tab.active { background:var(--accent); color:#0a0a0f; }

    .tab-content { display:none; }
    .tab-content.active { display:block; }

    .table-wrap { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:auto; }
    table { width:100%; border-collapse:collapse; font-size:0.85rem; }
    th { text-align:left; padding:14px 16px; color:var(--muted); font-weight:500; font-size:0.78rem; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--border); background:rgba(255,255,255,0.02); }
    td { padding:12px 16px; border-bottom:1px solid var(--border); color:var(--text); }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:rgba(255,255,255,0.02); }

    .badge { padding:3px 10px; border-radius:50px; font-size:0.7rem; font-weight:600; display:inline-block; }
    .badge-active { background:rgba(74,206,168,0.12); color:#4acea8; border:1px solid rgba(74,206,168,0.2); }
    .badge-disabled { background:rgba(232,90,90,0.12); color:#e85a5a; border:1px solid rgba(232,90,90,0.2); }

    .btn-sm {
      padding:6px 14px; border-radius:7px; font-family:'DM Sans',sans-serif;
      font-size:0.75rem; font-weight:600; cursor:pointer; transition:all 0.2s;
      border:none; margin-right:6px;
    }
    .btn-sm-del { background:rgba(232,90,90,0.12); color:#e85a5a; border:1px solid rgba(232,90,90,0.2); }
    .btn-sm-del:hover { background:rgba(232,90,90,0.25); }
    .btn-sm-toggle { background:rgba(200,169,110,0.12); color:var(--accent); border:1px solid rgba(200,169,110,0.2); }
    .btn-sm-toggle:hover { background:rgba(200,169,110,0.25); }

    /* Analytics cards */
    .analytics-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
    .analytics-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px; text-align:center; }
    .analytics-val { font-family:'Playfair Display',serif; font-size:2rem; color:var(--accent); line-height:1; margin-bottom:4px; }
    .analytics-lbl { font-size:0.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }

    /* Bar chart */
    .chart-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; }
    .chart-title { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--text); margin-bottom:20px; }
    .bar-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
    .bar-label { width:100px; font-size:0.8rem; color:var(--muted); flex-shrink:0; text-align:right; }
    .bar-track { flex:1; height:24px; background:rgba(255,255,255,0.04); border-radius:6px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:6px; background:var(--accent); transition:width 0.8s ease; min-width:0; display:flex; align-items:center; padding-left:8px; font-size:0.72rem; font-weight:600; color:#0a0a0f; }
    .bar-count { width:40px; font-size:0.8rem; color:var(--muted); flex-shrink:0; text-align:left; }

    .empty-tab { text-align:center; padding:60px 20px; color:var(--muted); }
    .empty-tab .icon { font-size:3rem; margin-bottom:12px; }
    .empty-tab .title { font-family:'Playfair Display',serif; font-size:1.2rem; color:var(--text); margin-bottom:6px; }

    .toast {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
      background:var(--card); border:1px solid var(--border); border-radius:12px;
      padding:12px 24px; font-size:0.85rem; color:var(--text);
      opacity:0; transition:opacity 0.3s; z-index:200; pointer-events:none;
    }
    .toast.show { opacity:1; }
    .toast.ok { border-color:#4acea8; }
    .toast.err { border-color:#e85a5a; }

    @media(max-width:768px) {
      header { padding:14px 20px; }
      .main { padding:20px; }
      .analytics-cards { grid-template-columns:repeat(2,1fr); }
      .tabs { width:100%; }
      .tab { flex:1; text-align:center; padding:10px 12px; font-size:0.78rem; }
      .bar-label { width:70px; font-size:0.72rem; }
    }
  </style>
</head>
<body>

<header>
  <h1 onclick="location.href='dashboard.html'">✦ GroomIQ Admin</h1>
</header>

<div class="main">
  <div class="page-title">Admin <span>Panel</span></div>
  <div class="page-sub">Manage users, analyses, and view platform analytics</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('users',this)">👥 Users</button>
    <button class="tab" onclick="switchTab('analyses',this)">📊 Analyses</button>
    <button class="tab" onclick="switchTab('analytics',this)">📈 Analytics</button>
  </div>

  <div class="tab-content active" id="tabUsers">
    <div class="table-wrap" id="usersTableWrap"></div>
  </div>

  <div class="tab-content" id="tabAnalyses">
    <div class="table-wrap" id="analysesTableWrap"></div>
  </div>

  <div class="tab-content" id="tabAnalytics">
    <div class="analytics-cards" id="analyticsCards"></div>
    <div class="chart-card">
      <div class="chart-title">Face Shape Distribution</div>
      <div id="shapeChart"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../js/auth.js"></script>
<script>
  const API = 'http://127.0.0.1:5001';

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast ' + type + ' show';
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function switchTab(tab, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
    if (tab === 'users') loadUsers();
    else if (tab === 'analyses') loadAnalyses();
    else if (tab === 'analytics') loadAnalytics();
  }

  function formatDate(iso) {
    try { return new Date(iso).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'}); }
    catch { return iso || '—'; }
  }

  // ========== USERS ==========
  async function loadUsers() {
    const wrap = document.getElementById('usersTableWrap');
    try {
      const d = await GroomIQAuth.apiFetch('/admin/users');
      const users = d.users || [];
      if (users.length === 0) {
        wrap.innerHTML = `<div class="empty-tab"><div class="icon">👥</div><div class="title">No Users</div></div>`;
        return;
      }
      wrap.innerHTML = `
      <table>
        <thead><tr>
          <th>ID</th><th>Name</th><th>Email</th><th>Created</th><th>Status</th><th>Actions</th>
        </tr></thead>
        <tbody>${users.map(u => `
          <tr>
            <td style="font-family:monospace;font-size:0.78rem;color:var(--muted)">${u.id || u.user_id || '—'}</td>
            <td>${u.full_name || u.name || '—'}</td>
            <td style="color:var(--muted)">${u.email || '—'}</td>
            <td style="color:var(--muted);font-size:0.8rem">${formatDate(u.created_at || u.created)}</td>
            <td>${u.disabled ? '<span class="badge badge-disabled">Disabled</span>' : '<span class="badge badge-active">Active</span>'}</td>
            <td>
              <button class="btn-sm btn-sm-toggle" onclick="toggleUser('${u.id || u.user_id}')">${u.disabled ? 'Enable' : 'Disable'}</button>
              <button class="btn-sm btn-sm-del" onclick="deleteUser('${u.id || u.user_id}')">Delete</button>
            </td>
          </tr>
        `).join('')}</tbody>
      </table>`;
    } catch(e) {
      wrap.innerHTML = `<div class="empty-tab"><div class="icon">⚠</div><div class="title">Failed to load users</div><div style="font-size:0.85rem;color:var(--muted)">${e.message || 'Server error'}</div></div>`;
    }
  }

  async function deleteUser(id) {
    if (!confirm('Delete user ' + id + '? This cannot be undone.')) return;
    try {
      await GroomIQAuth.apiFetch(`/admin/users/${id}`, { method:'DELETE' });
      showToast('User deleted', 'ok');
      loadUsers();
    } catch(e) { showToast('Error deleting user', 'err'); }
  }

  async function toggleUser(id) {
    try {
      await GroomIQAuth.apiFetch(`/admin/users/${id}/toggle`, { method:'POST' });
      showToast('User status toggled', 'ok');
      loadUsers();
    } catch(e) { showToast('Error toggling user', 'err'); }
  }

  // ========== ANALYSES ==========
  async function loadAnalyses() {
    const wrap = document.getElementById('analysesTableWrap');
    try {
      const d = await GroomIQAuth.apiFetch('/admin/analyses');
      const analyses = d.analyses || [];
      if (analyses.length === 0) {
        wrap.innerHTML = `<div class="empty-tab"><div class="icon">📊</div><div class="title">No Analyses</div></div>`;
        return;
      }
      wrap.innerHTML = `
      <table>
        <thead><tr>
          <th>ID</th><th>User</th><th>Face Shape</th><th>Confidence</th><th>Date</th><th>Actions</th>
        </tr></thead>
        <tbody>${analyses.map(a => `
          <tr>
            <td style="font-family:monospace;font-size:0.78rem;color:var(--muted)">${a.id || a.analysis_id || '—'}</td>
            <td>${a.user_name || a.full_name || a.name || '—'}</td>
            <td>${a.face_shape || a.faceShape || '—'}</td>
            <td>${a.confidence ? parseFloat(a.confidence).toFixed(1) + '%' : '—'}</td>
            <td style="color:var(--muted);font-size:0.8rem">${formatDate(a.date || a.created_at)}</td>
            <td><button class="btn-sm btn-sm-del" onclick="deleteAnalysis('${a.id || a.analysis_id}')">Delete</button></td>
          </tr>
        `).join('')}</tbody>
      </table>`;
    } catch(e) {
      wrap.innerHTML = `<div class="empty-tab"><div class="icon">⚠</div><div class="title">Failed to load analyses</div></div>`;
    }
  }

  async function deleteAnalysis(id) {
    if (!confirm('Delete analysis ' + id + '?')) return;
    try {
      await GroomIQAuth.apiFetch(`/admin/analyses/${id}`, { method:'DELETE' });
      showToast('Analysis deleted', 'ok');
      loadAnalyses();
    } catch(e) { showToast('Error deleting analysis', 'err'); }
  }

  // ========== ANALYTICS ==========
  async function loadAnalytics() {
    try {
      const d = await GroomIQAuth.apiFetch('/admin/analytics');
      const stats = d.analytics || d;
      const totalUsers = stats.total_users || stats.totalUsers || 0;
      const totalAnalyses = stats.total_analyses || stats.totalAnalyses || 0;
      const avgConf = stats.average_confidence || stats.avgConfidence || 0;
      const distribution = stats.face_shape_distribution || stats.faceShapeDistribution || {};

      document.getElementById('analyticsCards').innerHTML = `
        <div class="analytics-card"><div class="analytics-val">${totalUsers}</div><div class="analytics-lbl">Total Users</div></div>
        <div class="analytics-card"><div class="analytics-val">${totalAnalyses}</div><div class="analytics-lbl">Total Analyses</div></div>
        <div class="analytics-card"><div class="analytics-val">${parseFloat(avgConf).toFixed(1)}%</div><div class="analytics-lbl">Avg Confidence</div></div>
        <div class="analytics-card"><div class="analytics-val">${Object.keys(distribution).length}</div><div class="analytics-lbl">Face Shapes</div></div>
      `;

      const entries = Object.entries(distribution);
      const maxCount = Math.max(...entries.map(([,v]) => v), 1);
      const chartEl = document.getElementById('shapeChart');
      if (entries.length === 0) {
        chartEl.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">No data yet</div>';
        return;
      }
      const colors = ['#c8a96e','#4acea8','#60b8f5','#7c6fcd','#e8834a','#d97cd4','#e85a5a'];
      chartEl.innerHTML = entries.map(([shape, count], i) => `
        <div class="bar-row">
          <div class="bar-label">${shape}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${(count/maxCount)*100}%;background:${colors[i % colors.length]}">${count > 0 ? count : ''}</div>
          </div>
          <div class="bar-count">${count}</div>
        </div>
      `).join('');
    } catch(e) {
      document.getElementById('analyticsCards').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">Failed to load analytics</div>`;
    }
  }

  // ========== INIT ==========
  document.addEventListener('DOMContentLoaded', async () => {
    if (!GroomIQAuth.requireAuth()) return;
    try {
      const profile = await GroomIQAuth.apiFetch('/profile');
      if (!profile.is_admin && !profile.admin) {
        showToast('Admin access required', 'err');
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
        return;
      }
      loadUsers();
    } catch(e) {
      showToast('Authentication failed', 'err');
      setTimeout(() => window.location.href = 'login.html', 1500);
    }
  });
</script>
</body>
</html>
