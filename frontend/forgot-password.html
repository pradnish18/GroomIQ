<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - GroomIQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --border: #2a2a3a;
      --accent: #c8a96e;
      --text: #e8e8f0;
      --muted: #888899;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(200,169,110,0.06) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .logo p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 6px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card > p {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 28px;
    }

    .input-group { margin-bottom: 16px; }

    .input-group label {
      display: block;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus { border-color: var(--accent); }
    .input-group input::placeholder { color: var(--muted); }

    .form-msg {
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }

    .form-msg.error {
      display: block;
      background: rgba(232,90,90,0.1);
      border: 1px solid rgba(232,90,90,0.3);
      color: #e85a5a;
    }

    .form-msg.success {
      display: block;
      background: rgba(78,202,168,0.1);
      border: 1px solid rgba(78,202,168,0.3);
      color: #4acea8;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    .btn:hover {
      background: #d4b87a;
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(200,169,110,0.25);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .switch {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .switch a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .switch a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="logo">
    <h1>✦ GroomIQ</h1>
    <p>AI Grooming Assistant • Hair • Beard • Style</p>
  </div>

  <div class="card">
    <h2>Forgot Password</h2>
    <p>Enter your email and we'll send you a reset link</p>

    <div class="form-msg" id="formMsg"></div>

    <form id="forgotForm" novalidate>
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <button type="submit" class="btn" id="submitBtn">Send Reset Link</button>
    </form>

    <p class="switch">
      Remember your password? <a href="login.html">Back to Login</a>
    </p>
  </div>

</div>

<script>
const API_BASE = 'http://127.0.0.1:5001';

const form = document.getElementById('forgotForm');
const emailInput = document.getElementById('email');
const submitBtn = document.getElementById('submitBtn');
const formMsg = document.getElementById('formMsg');

function showMessage(msg, type) {
  formMsg.className = 'form-msg ' + type;
  formMsg.textContent = msg;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = emailInput.value.trim();

  if (!email) {
    showMessage('Please enter your email address.', 'error');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Sending...';
  showMessage('', '');

  try {
    const res = await fetch(`${API_BASE}/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || 'Failed to send reset link');
    }

    showMessage(data.message || 'Reset link sent! Check your inbox.', 'success');
    emailInput.value = '';
  } catch (err) {
    showMessage(err.message, 'error');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Send Reset Link';
  }
});
</script>
</body>
</html>
